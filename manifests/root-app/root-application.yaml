# App-of-apps root Application — de ENIGE ArgoCD-Application die je na een
# reinstall nog met de hand hoeft aan te maken. Deze beheert op zijn beurt
# alles in apps/:
#   - 4 app-Applications (personal-news-feed, smb-timemachine,
#     softwarefactory-dashboard, agent-access) — personal-news-feed en
#     software-factory blijven gewoon los beheerd/CI-gebumpt in hun eigen
#     repo, alleen de ArgoCD-Application-pointer zelf staat hier.
#   - personal-news-feed-applicationset.yaml — de PR-preview-ApplicationSet
#     (verhuisd uit personal-news-feed-by-claude-code/deploy/applicationset.yaml)
#   - github-pr-token-sealed-secret.yaml — token voor die ApplicationSet
#     (verhuisd uit een imperatieve bootstrap.sh-stap)
#   - preview-ns-labeller-deployment.yaml + preview-ns-labeller-rbac.yaml —
#     verhuisd uit personal-news-feed-by-claude-code/deploy/preview-ns-labeller/
#     (de RBAC kon pas mee toen de instance cluster-scoped werd, 2026-07-08)
#
# Enige prereq vóór je dit apply't: ../../scripts/bootstrap/bootstrap-cluster.sh
# (ArgoCD cluster-scoped, Sealed Secrets, storage, Reflector) — en bij een
# rebuild eerst de sealed-secrets-key restoren. Namespaces maakt ArgoCD
# zelf aan (CreateNamespace=true; werkt sinds de instance cluster-scoped
# draait, zie ../cluster-bootstrap/argocd-operator-subscription.yaml), en
# ClusterRoles sync't 'ie ook gewoon uit git.
#
# Apply met (of via ../../scripts/bootstrap/bootstrap-apps.sh):
#   oc apply -f manifests/root-app/root-application.yaml
#
# Daarna volledig autonoom: nieuwe/gewijzigde resources in apps/ worden
# vanzelf aangemaakt/bijgewerkt/verwijderd (prune + selfHeal aan) zodra je
# commit.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/robbertvdzon/robberts-infrastructure.git
    targetRevision: main
    path: manifests/root-app/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
