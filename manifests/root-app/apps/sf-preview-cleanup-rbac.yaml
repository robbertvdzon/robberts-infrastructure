# RBAC voor de Software Factory's eigen preview-namespace-cleanup
# (PreviewEnvironmentCleaner.kt, `oc delete project <namespace>` na een
# merge/re-implement).
#
# Bewust een APARTE identity, los van `sf-agent-readonly` (die alleen `view`
# heeft in personal-news-feed/software-factory en gedeeld wordt met reguliere
# story-agents — die moeten read-only blijven, dat is een bewuste
# veiligheidsgrens). Deze identity kan alleen `namespaces` opvragen/wissen,
# verder niets — geen toegang tot secrets, pods, deployments, etc.
#
# Achtergrond: zonder dit recht bleef `oc delete project` altijd stil (of
# luid) falen, wat exact de oorzaak was van de 29 verweesde pnf-pr-*-
# namespaces (zie docs/cluster-inventory.md §8) — dit lost dat structureel op
# voor alle projecten, niet alleen personal-feed/robberts-assistent.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sf-preview-cleanup
  namespace: software-factory
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sf-preview-cleanup
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "delete"]
  # PreviewEnvironmentCleaner draait `oc delete project <ns>` — dat is OpenShift's
  # eigen Project-resource (project.openshift.io), niet de kale core-namespace.
  # Deleten via Project cascadeert naar de onderliggende Namespace.
  - apiGroups: ["project.openshift.io"]
    resources: ["projects"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sf-preview-cleanup
subjects:
  - kind: ServiceAccount
    name: sf-preview-cleanup
    namespace: software-factory
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sf-preview-cleanup
---
# Lang-levend token voor deze ServiceAccount, zodat de factory er lokaal
# (buiten het cluster) een kubeconfig mee kan bouwen — zelfde patroon als
# een normale ServiceAccount-token-Secret (K8s 1.24+ genereert deze niet
# meer automatisch, dus expliciet aanmaken).
apiVersion: v1
kind: Secret
metadata:
  name: sf-preview-cleanup-token
  namespace: software-factory
  annotations:
    kubernetes.io/service-account.name: sf-preview-cleanup
type: kubernetes.io/service-account-token
