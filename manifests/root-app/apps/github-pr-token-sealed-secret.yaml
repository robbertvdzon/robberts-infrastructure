# github-pr-token — nodig door personal-news-feed's PullRequest-ApplicationSet-
# generator (personal-news-feed-applicationset.yaml hiernaast) om open PR's
# te lezen. Was voorheen een imperatieve kopie van GITHUB_TOKEN uit
# newsfeed-api-keys, afgeleid bij elke `bootstrap.sh`-run (2026-07-08:
# vervangen door deze eigen SealedSecret, rechtstreeks de argocd-namespace
# in — geen afleid-bij-bootstrap-stap meer nodig, puur GitOps).
#
# LET OP: geseald met het ACTUELE cluster-cert (opgehaald via
# `kubeseal --fetch-cert`), niet met een mogelijk verouderde lokale kopie —
# de sealed-secrets-key roteert periodiek (Bitnami-default), dus check bij
# het opnieuw sealen altijd of je cert-bestand nog actueel is.
#
# Opnieuw sealen (bv. na token-rotatie):
#   export KUBECONFIG=~/okd-sno/sno/auth/kubeconfig
#   oc get secret github-pr-token -n argocd -o yaml \
#     | kubeseal --cert <(kubeseal --fetch-cert) -o yaml \
#     > manifests/root-app/apps/github-pr-token-sealed-secret.yaml
# (of vanuit een verse plaintext Secret-YAML met het nieuwe token, zie
# personal-news-feed-by-claude-code/deploy/seal-secrets.sh voor het patroon.)
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: github-pr-token
  namespace: argocd
spec:
  encryptedData:
    token: 
  template:
    metadata:
      name: github-pr-token
      namespace: argocd
    type: Opaque
