# Verhuisd hierheen vanuit personal-news-feed-by-claude-code/deploy/argocd-application.yaml
# (2026-07-08, app-of-apps-consolidatie) — inhoud ongewijzigd, alleen de
# locatie van deze pointer. De daadwerkelijke deploy-manifesten (met
# CI-gebumpte image-tags) blijven gewoon in de personal-news-feed-repo zelf,
# zie spec.source hieronder.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: personal-news-feed
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/robbertvdzon/personal-news-feed-by-claude-code.git
    targetRevision: main
    path: deploy/overlays/openshift
  destination:
    server: https://kubernetes.default.svc
    namespace: personal-news-feed
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # CreateNamespace=true maakt de namespace écht zelf aan: de ArgoCD-
      # instance draait cluster-scoped (sinds 2026-07-08, zie
      # ../../cluster-bootstrap/argocd-operator-subscription.yaml). In de
      # namespaced mode van dáárvoor kon dat niet (allow-list-kip-en-ei,
      # zie ../../../docs/architecture.md "Historie") en was personal-news-
      # feed's deploy/bootstrap.sh een verplichte handmatige prereq.
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: argocd
    # ServerSideApply=true verwijderd: triggerde ComparisonError op
    # OpenShift Route-CRD ("unable to resolve parseableType").
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
