# Verhuisd hierheen vanuit personal-news-feed-by-claude-code/deploy/argocd-application.yaml
# (2026-07-08, app-of-apps-consolidatie) — inhoud ongewijzigd, alleen de
# locatie van deze pointer. De daadwerkelijke deploy-manifesten (met
# CI-gebumpte image-tags) blijven gewoon in de personal-news-feed-repo zelf,
# zie spec.source hieronder.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: personal-news-feed
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/robbertvdzon/personal-news-feed-by-claude-code.git
    targetRevision: main
    path: deploy/overlays/openshift
  destination:
    server: https://kubernetes.default.svc
    namespace: personal-news-feed
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # CreateNamespace=true kan hier sinds 2026-07-08 weer aan: de
      # argocd-application-controller-ServiceAccount kreeg toen alsnog het
      # cluster-scoped recht om Namespace-objecten aan te maken (zie
      # ../../cluster-bootstrap/argocd-namespace-creator-rbac.yaml) — dat
      # ontbrak eerder volledig (bevestigd met `oc auth can-i`), vandaar de
      # oude workaround via bootstrap.sh. bootstrap.sh blijft 'm voor de
      # zekerheid ook nog aanmaken (idempotent, onschadelijk dubbelop).
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: argocd
    # ServerSideApply=true verwijderd: triggerde ComparisonError op
    # OpenShift Route-CRD ("unable to resolve parseableType").
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
