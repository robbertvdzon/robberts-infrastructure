# Verhuisd hierheen vanuit personal-news-feed-by-claude-code/deploy/argocd-application.yaml
# (2026-07-08, app-of-apps-consolidatie) — inhoud ongewijzigd, alleen de
# locatie van deze pointer. De daadwerkelijke deploy-manifesten (met
# CI-gebumpte image-tags) blijven gewoon in de personal-news-feed-repo zelf,
# zie spec.source hieronder.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: personal-news-feed
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/robbertvdzon/personal-news-feed-by-claude-code.git
    targetRevision: main
    path: deploy/overlays/openshift
  destination:
    server: https://kubernetes.default.svc
    namespace: personal-news-feed
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # CreateNamespace=true + managedNamespaceMetadata staan aan sinds
      # 2026-07-08 (../../cluster-bootstrap/argocd-namespace-creator-rbac.yaml
      # gaf de controller-ServiceAccount create/update/patch-recht op
      # Namespace-objecten) — MAAR dit vervangt bootstrap.sh's eigen
      # `oc create namespace` NIET. Geverifieerd met een echte test-PR
      # (2026-07-08): deze ArgoCD-installatie houdt een aparte allow-list bij
      # (secret argocd-default-cluster-config, veld `namespaces`) die pas
      # gevuld wordt NA het zien van een al-bestaande, al-gelabelde
      # namespace — een Application kan een namespace dus nooit voor het
      # eerst zelf aanmaken (kip-en-ei). bootstrap.sh blijft dus verplicht;
      # CreateNamespace=true is hier alleen nuttig om de labels correct te
      # houden zodra de namespace al bestaat. Zie
      # ../../docs/cluster-inventory.md §1 voor de volledige uitleg.
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: argocd
    # ServerSideApply=true verwijderd: triggerde ComparisonError op
    # OpenShift Route-CRD ("unable to resolve parseableType").
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
