# Verhuisd hierheen vanuit ../../smb-timemachine/argocd-application.yaml
# (2026-07-08, app-of-apps-consolidatie).
#
# CreateNamespace=true maakt de namespace écht zelf aan: de ArgoCD-instance
# draait cluster-scoped (sinds 2026-07-08, zie
# ../../cluster-bootstrap/argocd-operator-subscription.yaml). In de
# namespaced mode van dáárvoor kon dat niet (allow-list-kip-en-ei, zie
# ../../../docs/architecture.md "Historie") en was
# `oc apply -f manifests/smb-timemachine/namespace.yaml` een verplichte
# handmatige prereq.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smb-timemachine
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/robbertvdzon/robberts-infrastructure.git
    targetRevision: main
    path: manifests/smb-timemachine
  destination:
    server: https://kubernetes.default.svc
    namespace: smb-timemachine
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: argocd
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
