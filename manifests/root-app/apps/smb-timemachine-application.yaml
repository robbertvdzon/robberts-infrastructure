# Verhuisd hierheen vanuit ../../smb-timemachine/argocd-application.yaml
# (2026-07-08, app-of-apps-consolidatie).
#
# CreateNamespace=true + managedNamespaceMetadata staan aan sinds 2026-07-08
# (../../cluster-bootstrap/argocd-namespace-creator-rbac.yaml gaf de
# controller-ServiceAccount het recht om Namespace-objecten te
# create/update/patchen) — MAAR dit vervangt de handmatige
# `oc apply -f manifests/smb-timemachine/namespace.yaml`-stap NIET.
# Geverifieerd met een echte test-PR (2026-07-08): deze ArgoCD-installatie
# houdt een aparte allow-list bij (secret argocd-default-cluster-config,
# veld `namespaces`) die pas gevuld wordt NA het zien van een al-bestaande,
# al-gelabelde namespace — een Application kan een namespace dus nooit voor
# het eerst zelf aanmaken (kip-en-ei). CreateNamespace=true is hier alleen
# nuttig om de labels correct te houden zodra de namespace al bestaat. Zie
# ../../docs/cluster-inventory.md §1 voor de volledige uitleg.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smb-timemachine
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/robbertvdzon/robberts-infrastructure.git
    targetRevision: main
    path: manifests/smb-timemachine
  destination:
    server: https://kubernetes.default.svc
    namespace: smb-timemachine
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: argocd
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
