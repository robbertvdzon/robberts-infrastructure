# Verhuisd hierheen vanuit ../../smb-timemachine/argocd-application.yaml
# (2026-07-08, app-of-apps-consolidatie).
#
# CreateNamespace=true kan hier sinds 2026-07-08 aan: de
# argocd-application-controller-ServiceAccount kreeg toen het cluster-scoped
# recht om Namespace-objecten aan te maken (zie
# ../../cluster-bootstrap/argocd-namespace-creator-rbac.yaml) — dat ontbrak
# eerder volledig (bevestigd via `oc auth can-i create namespaces --as=...`
# → "no"), vandaar de oude handmatige `oc apply -f namespace.yaml`-stap.
# manifests/smb-timemachine/namespace.yaml blijft bewust staan als fallback/
# troubleshooting-stap mocht dit onverhoopt niet werken bij een reinstall.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smb-timemachine
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/robbertvdzon/robberts-infrastructure.git
    targetRevision: main
    path: manifests/smb-timemachine
  destination:
    server: https://kubernetes.default.svc
    namespace: smb-timemachine
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: argocd
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
