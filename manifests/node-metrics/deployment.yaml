# Serveert geheugen-/SSD-/externe-HDD-gebruik van de node als klein JSON-
# endpoint, voor robberts-assistent's OpenShift-koppeling (zie
# ../../../robberts-assistent/docs/nightly-checks.md
# "Uitbreidingsideeën voor de OpenShift-check zelf" — er is geen
# Prometheus/node-exporter/metrics-server op dit cluster, dus dit is de
# kleinste stap om die cijfers toch te krijgen, zonder een volledige
# monitoring-stack).
#
# hostPath vereist de privileged SCC, zie rolebinding-scc.yaml
# (zelfde patroon als ../smb-timemachine/deployment.yaml). Let op: dat is
# een ander ding dan de container zelf `privileged: true` geven — dit
# script leest alleen /proc/meminfo en doet statvfs op read-only mounts,
# geen host-namespaces/capabilities nodig, dus die containersecuritycontext
# staat er bewust NIET op (in tegenstelling tot smb-timemachine, waar
# avahi/mDNS wél CAP_NET_RAW/CAP_NET_ADMIN nodig heeft). De SCC-RoleBinding
# staat hostPath toe zonder dat de container zelf host-root-rechten krijgt.
#
# `runAsUser: 1000` + `seLinuxOptions.type: spc_t` (wél nodig, sinds de Time
# Machine-uitlezing): `runAsUser: 1000` alleen bleek niet genoeg — op het
# echte cluster gaf `stat` op de `timemachine`-map keurig `drwxrwxrwx
# uid=1000` terug, maar `os.listdir()` (en dus de app zelf) kreeg alsnog
# `PermissionError: [Errno 13] Permission denied`. Dat `stat` (getattr) wél
# lukt en `listdir` (read) niet, is het klassieke SELinux-symptoom (aparte
# permission-classes), geen POSIX-rechtenprobleem.
#
# Bewust NIET `privileged: true` (zoals smb-timemachine voor hetzelfde
# hostPath gebruikt): dat geeft o.a. CAP_SYS_ADMIN, waarmee een proces in
# theorie de eigen `readOnly: true`-mount actief zou kunnen her-mounten als
# read-write — een veel grotere blast radius dan nodig voor "lees één mapje".
# `seLinuxOptions.type: spc_t` (toegestaan door de al gekoppelde privileged-
# SCC, zie rolebinding-scc.yaml) verandert alléén hoe SELinux dit proces
# classificeert voor toegang tot host-gelabelde bestanden — geen extra
# Linux-capabilities, dus de read-only-mount blijft ook daadwerkelijk
# onomzeilbaar afgedwongen door de kernel.
#
# Image: kaal python:3-alpine — het serverscript (configmap-server.yaml)
# gebruikt alleen de standaardbibliotheek, dus geen pip install/eigen image
# nodig.
#
# Nog niet getest op het echte cluster — verifieer na deploy met:
#   oc run -it --rm debug --image=curlimages/curl -n node-metrics --restart=Never \
#     -- curl -s http://node-metrics.node-metrics.svc.cluster.local:8080/metrics.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-metrics
  namespace: node-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-metrics
  template:
    metadata:
      labels:
        app: node-metrics
    spec:
      serviceAccountName: node-metrics
      # Eén node in dit cluster, maar expliciet zodat dit niet per ongeluk
      # ergens anders geschedule wordt als de cluster ooit groeit — zelfde
      # nodeSelector als ../smb-timemachine/deployment.yaml.
      nodeSelector:
        kubernetes.io/hostname: sno.lab.vdzon.com
      containers:
        - name: node-metrics
          image: python:3-alpine
          command: ["python3", "/scripts/serve.py"]
          securityContext:
            runAsUser: 1000
            seLinuxOptions:
              type: spc_t
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: host-proc
              mountPath: /host-proc
              readOnly: true
            - name: host-root
              mountPath: /host-root
              readOnly: true
            - name: host-external-hdd
              mountPath: /host-external-hdd
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: script
          configMap:
            name: node-metrics-server
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        # statvfs geeft filesystem-brede stats terug, ongeacht welk pad je
        # target — /etc zit op dezelfde filesystem als / (geen aparte
        # partitie op deze node) en geeft dus identieke SSD-cijfers, met
        # veel minder leestoegang dan de hele hostroot mounten.
        - name: host-root
          hostPath:
            path: /etc
            type: Directory
        - name: host-external-hdd
          hostPath:
            path: /var/mnt/external-hdd
            type: Directory
