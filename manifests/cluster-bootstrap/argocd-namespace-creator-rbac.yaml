# ⚠️ OBSOLEET sinds 2026-07-08 — wordt NIET meer ge-apply'd door
# bootstrap-cluster.sh. De ArgoCD-instance draait nu cluster-scoped
# (ARGOCD_CLUSTER_CONFIG_NAMESPACES in argocd-operator-subscription.yaml)
# en krijgt de benodigde cluster-rechten van de operator zelf. Bewaard als
# referentie: mocht ooit teruggeschakeld worden naar een smallere opzet
# ("smaak 3": cluster-scoped met eigen minimale ClusterRole i.p.v. de
# operator-defaults), dan is dit het startpunt. Op het live cluster mag een
# eerder ge-apply'de versie blijven staan of opgeruimd worden
# (oc delete clusterrole/clusterrolebinding argocd-namespace-creator).
#
# Oorspronkelijke uitleg:
# Geeft de ArgoCD application-controller het recht om Namespace-objecten aan
# te maken — zonder dit ontbrak `CreateNamespace=true` in de praktijk elke
# keer stil: de argocd-operator geeft de controller-ServiceAccount (in
# namespaced mode) alleen per-namespace Role/RoleBindings, nooit een
# cluster-brede ClusterRoleBinding. Namespace is cluster-scoped, dus
# zonder deze ClusterRole kon de controller er nooit één aanmaken (bevestigd
# via `oc auth can-i create namespaces --as=system:serviceaccount:argocd:
# argocd-argocd-application-controller` → "no", vóór dit bestand).
# NB: dit loste het allow-list-kip-en-ei overigens aantoonbaar NIET op —
# zie ../../docs/architecture.md "Historie".
#
# Bewust GEEN `delete`: namespace-verwijdering blijft altijd een bewuste,
# handmatige actie — zie de 29 stale pnf-pr-*-namespaces die opgeruimd
# moesten worden (ArgoCD's ApplicationSet pruned de Application wel bij
# PR-close, maar had nooit het recht gehad om ook de namespace te prunen, en
# dat willen we ook niet automatisch geven).
#
# `update`/`patch` zijn wel nodig voor `managedNamespaceMetadata` (labels op
# de namespace zetten/houden bij elke sync), niet alleen voor de aanmaak zelf.
#
# Apply met: oc apply -f manifests/cluster-bootstrap/argocd-namespace-creator-rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-namespace-creator
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-namespace-creator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-namespace-creator
subjects:
  - kind: ServiceAccount
    name: argocd-argocd-application-controller
    namespace: argocd
