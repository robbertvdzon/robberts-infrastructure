# MachineConfig: mount de externe USB-HDD (exFAT) op /var/mnt/external-hdd.
#
# Schijf: Verbatim Desktop HDD 3.0 (3.7TB, exFAT, label "data"), geadresseerd
# via /dev/disk/by-id/usb-Verbatim_Desktop_HDD_3.0_WM5O10766000-0:0-part2 —
# stabiel over reboots, in tegenstelling tot /dev/sdc2 (kan van letter wisselen
# als er meer USB-schijven worden aangesloten).
#
# uid=1000,gid=1000: exFAT heeft geen POSIX-ownership per bestand — de
# mount-opties bepalen de eigenaar van ALLE bestanden op de share (moet
# overeenkomen met UID_robbert in ../smb-timemachine/deployment.yaml).
#
# Getest via handmatige `mount` op de node (2026-07-07): mount + chown +
# Samba-share werken. Op 2026-07-08 permanent gemaakt via dit MachineConfig —
# de externe HDD is nu de definitieve Time Machine-bestemming (vervangt de
# interne 4TB-schijf, zie ../smb-timemachine/README.md en
# 50-local-storage-mount.yaml die om die reden is verwijderd).
#
# LET OP — dit bestand (opnieuw) toepassen triggert een node-reboot (MCO
# herstart de node altijd bij een MachineConfig-wijziging). Op deze
# SNO-cluster betekent dat een paar minuten downtime voor ALLES.
#
# Apply met: oc apply -f 51-external-hdd-mount.yaml
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 51-external-hdd-mount
  labels:
    machineconfiguration.openshift.io/role: master
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
      - path: /etc/tmpfiles.d/external-hdd.conf
        mode: 0420
        overwrite: true
        contents:
          # d /var/mnt/external-hdd 0755 root root -
          source: data:text/plain;base64,ZCAvdmFyL21udC9leHRlcm5hbC1oZGQgMDc1NSByb290IHJvb3QgLQo=
    systemd:
      units:
      - name: var-mnt-external\x2dhdd.mount
        enabled: true
        contents: |
          [Unit]
          Description=Mount external USB HDD (exFAT) for SMB/Time Machine
          Before=local-fs.target
          [Mount]
          What=/dev/disk/by-id/usb-Verbatim_Desktop_HDD_3.0_WM5O10766000-0:0-part2
          Where=/var/mnt/external-hdd
          Type=exfat
          Options=uid=1000,gid=1000,umask=0000,nofail
          [Install]
          WantedBy=local-fs.target
