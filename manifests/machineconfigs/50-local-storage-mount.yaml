# MachineConfig: mount de losse databaseschijf op /var/mnt/localpv.
#
# Huidige schijf: 4TB, geadresseerd via /dev/disk/by-id/wwn-0x5000c500f15d6c9c.
#
# LET OP — deze schijf is (nog) niet aan een StorageClass gekoppeld.
# local-path-provisioner wijst naar /var/lib/local-path-provisioner op de
# kleine OS-SSD (zie ../../docs/architecture.md). /var/mnt/localpv is dus vrije
# ruimte, bedoeld voor de Samba/Time-Machine-share in ../smb-timemachine/.
#
# Bij het vervangen van deze schijf door de 12TB-schijf: zie
# ../../docs/disk-4tb-to-12tb-migration.md. Die procedure schakelt over van
# `by-id` (verandert per fysieke schijf) naar `by-label` (blijft gelijk zolang
# je de nieuwe schijf hetzelfde label geeft) zodat een toekomstige schijf-swap
# geen MachineConfig-wijziging + reboot meer vereist.
#
# Apply met: oc apply -f 50-local-storage-mount.yaml
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 50-local-storage-mount
  labels:
    machineconfiguration.openshift.io/role: master
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
      - path: /etc/tmpfiles.d/localpv.conf
        mode: 0420
        overwrite: true
        contents:
          # d /var/mnt/localpv 0755 root root -
          source: data:text/plain;base64,ZCAvdmFyL21udC9sb2NhbHB2IDA3NTUgcm9vdCByb290IC0K
    systemd:
      units:
      - name: var-mnt-localpv.mount
        enabled: true
        contents: |
          [Unit]
          Description=Mount local data disk for local-path-provisioner
          Before=local-fs.target
          [Mount]
          What=/dev/disk/by-id/wwn-0x5000c500f15d6c9c
          Where=/var/mnt/localpv
          Type=xfs
          Options=defaults
          [Install]
          WantedBy=local-fs.target
