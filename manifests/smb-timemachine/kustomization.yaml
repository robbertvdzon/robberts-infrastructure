apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - serviceaccount.yaml
  - rolebinding-scc.yaml
  - sealed-secret-credentials.yaml
  - deployment.yaml
# namespace.yaml staat niet in resources: de Application maakt de namespace
# zelf aan via CreateNamespace=true (werkt écht sinds de ArgoCD-instance
# cluster-scoped draait, 2026-07-08 — daarvóór was dit een handmatige prereq
# omdat namespaced mode geen Namespace-objecten mocht beheren: "cluster level
# Namespace ... can not be managed when in namespaced mode"). Het bestand
# blijft bestaan als documentatie van de labels.
