# Kopieer naar secret-smb-credentials.yaml (gitignored, of seal 'm net als de
# app-secrets — zie deploy/seal-secrets.sh in de app-repo's voor het patroon),
# vul een echt wachtwoord in, en:
#   oc apply -f secret-smb-credentials.yaml
apiVersion: v1
kind: Secret
metadata:
  name: samba-timemachine-credentials
  namespace: smb-timemachine
type: Opaque
stringData:
  SAMBA_PASSWORD: "changeme"
