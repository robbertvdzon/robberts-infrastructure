# Legacy-stijl SA-token: non-expiring (i.t.t. TokenRequest-tokens die na
# ~1u verlopen) — bewuste keuze, dit is een lang-levende CLI/tool-credential,
# geen korte sessie. Rotatie: verwijder deze Secret + apply opnieuw (nieuwe
# token), of `oc create token claude-agent -n agent-access --duration=...`
# voor een kortlevende variant.
apiVersion: v1
kind: Secret
metadata:
  name: claude-agent-token
  namespace: agent-access
  annotations:
    kubernetes.io/service-account.name: claude-agent
type: kubernetes.io/service-account-token
