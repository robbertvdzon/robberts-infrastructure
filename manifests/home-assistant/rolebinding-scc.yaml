# Declaratieve SCC-grant, zelfde aanpak als
# ../smb-timemachine/rolebinding-scc.yaml.
#
# Was eerst `hostmount-anyuid` (minder rechten, alleen hostPath) — bleek in
# de praktijk niet genoeg: die SCC staat GEEN `hostNetwork: true` toe
# ("Host network is not allowed to be used"), waardoor geen enkele pod kon
# starten. Alleen `privileged` staat de combinatie hostPath + hostNetwork +
# hostPort toe die deze Deployment nodig heeft — zelfde reden waarom
# smb-timemachine dit ook al gebruikt.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: system:openshift:scc:privileged
  namespace: home-assistant
subjects:
  - kind: ServiceAccount
    name: home-assistant
    namespace: home-assistant
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
