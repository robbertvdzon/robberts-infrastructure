# Seed voor configuration.yaml — wordt door de initContainer in
# deployment.yaml alleen gekopieerd als /config/configuration.yaml nog niet
# bestaat (verse of vervangen HDD). Latere wijzigingen via de HA-UI of met de
# hand worden nooit overschreven; dit ConfigMap is puur een startpunt.
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-default-config
  namespace: home-assistant
data:
  configuration.yaml: |
    default_config:

    # Recorder (history/logbook/long-term-statistics) bewust op de losse
    # PVC, niet op de exFAT-HDD waar de rest van /config staat — zie
    # README.md in deze map voor de reden (SQLite-writes vs exFAT).
    recorder:
      db_url: sqlite:////data/recorder/home-assistant_v2.db

    # Zonder dit: "400 Bad Request" / "your HTTP integration is not set-up
    # for reverse proxies" — de OpenShift Router (Route-TLS-termination)
    # stuurt verzoeken door, en HA vertrouwt een onbekende reverse proxy
    # standaard niet. 192.168.178.64 is het node-IP (zie
    # ../../docs/architecture.md) — de Route draait op dezelfde node als de
    # pod, dus dat IP is wat HA als afzender ziet.
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 192.168.178.64
