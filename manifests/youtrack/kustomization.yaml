# Kustomization voor YouTrack — onze (toekomstige) JIRA-vervanger.
#
# Wordt door ArgoCD gesynct via argocd-application.yaml (in deze map).
#
# Verhuisd hierheen vanuit software-factory/deploy/youtrack (2026-07-07) —
# volledig statisch (geen CI-image-bump, geen preview-koppeling), dus zonder
# complicaties te verplaatsen naar de "alle infra op 1 plek"-repo.
#
# Cluster-scoped pre-conditions (niet via ArgoCD) staan als losse
# `oc`-commando's gedocumenteerd in argocd-application.yaml:
# namespace + managed-by-label + anyuid/privileged SCC op de default-SA.
#
# Image-tag pinnen we expliciet (geen `latest`/`stable`) zodat upgrades
# bewuste commits zijn — YouTrack-versies kunnen DB-migraties triggeren.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: youtrack

resources:
  - pvcs.yaml
  - deployment.yaml
  - service.yaml
  - route.yaml

# Centrale plek om de image-tag te bumpen. Past automatisch alle
# voorkomens aan in deployment.yaml.
images:
  - name: jetbrains/youtrack
    newName: jetbrains/youtrack
    newTag: "2026.1.13570"
