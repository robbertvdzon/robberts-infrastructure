# ArgoCD Application voor YouTrack — onze (toekomstige) JIRA-vervanger.
#
# Eenmalig ge-apply'd op het cluster, daarna autonoom beheerd door ArgoCD
# (self-heal aan, prune uit).
#
# Bewust een losse Application: YouTrack draagt alle story-state en mag
# NIET als bijvangst worden verwijderd als iemand per ongeluk
# manifests/youtrack/ aanpast of weghaalt.
#
# `automated.prune: false`: ArgoCD ruimt zelf geen resources op uit deze
# namespace. PVCs blijven dus staan bij `oc delete app` — dat is het
# gewenste gedrag voor een datastore.
#
# Verhuisd hierheen vanuit software-factory/deploy/youtrack-application.yaml
# (2026-07-07) — volledig statisch (geen CI-image-bump, geen preview-
# koppeling), dus zonder complicaties te verplaatsen.
#
# Cluster-scoped prerequisites (eenmalig, met de hand — kan ArgoCD niet):
#   oc create namespace youtrack
#   oc label namespace youtrack argocd.argoproj.io/managed-by=argocd
#   # YouTrack draait als UID 13001 (vaste user in de JetBrains-image);
#   # restricted-v2 overschrijft dat naar een random UID en breekt bin/-scripts:
#   oc adm policy add-scc-to-user anyuid     -z default -n youtrack
#   # privileged voor de init-container die SELinux-labels van de local-path
#   # PV's relabelt naar container_file_t (anders permission-denied op logs):
#   oc adm policy add-scc-to-user privileged -z default -n youtrack
#   # daarna deze Application aanmaken:
#   oc apply -f manifests/youtrack/argocd-application.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: youtrack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/robbertvdzon/robberts-infrastructure.git
    targetRevision: main
    path: manifests/youtrack
  destination:
    server: https://kubernetes.default.svc
    namespace: youtrack
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
